apiVersion: batch/v1
kind: Job
metadata:
  name: surgcast-train-full-gpu2  # kubectl delete job surgcast-train-full-gpu2
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: gitlab-docker-secret
      volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
        - name: dataset-volume
          persistentVolumeClaim:
            claimName: yuming-pvc-2tb
      containers:
        - name: surgcast
          image: docker.aiml.team/yuming.chen/surgcast:latest
          imagePullPolicy: Always
          stdin: true
          tty: true
          command: ["/bin/bash", "-c"]
          args:
              - |
                cd /yuming/projects/surgcast && \
                ./scripts/run_cluster.sh surgcast_full \
                    --stage full \
                    --experiment configs/experiment/full.yaml
          resources:
            requests:
              nvidia.com/gpu: 2
            limits:
              nvidia.com/gpu: 2
          volumeMounts:
            - name: dataset-volume
              mountPath: /yuming
            - name: shared-memory
              mountPath: /dev/shm
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                    name: github-token
                    key:  access-token
            - name: HF_HOME
              value: /yuming/huggingface
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                    name: surgcast-secrets
                    key:  hf-token
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                    name: surgcast-secrets
                    key:  wandb-api-key
            - name: NCCL_DEBUG
              value: "WARN"
            - name: NCCL_TIMEOUT
              value: "1800"
            - name: NCCL_IB_DISABLE
              value: "1"
            - name: NCCL_P2P_LEVEL
              value: "NVL"
