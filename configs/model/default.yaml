dynamics_version: B

backbone:
  name: dinov3_vitb16
  feature_dim: 768
  frozen: true
  image_size: 518
  alternative_backbones:
    - lemonfm
    - dinov2_vitb14
    - resnet50
encoder:
  input_proj_dim: 512
  transformer_layers: 6
  num_heads: 8
  dropout: 0.10
transition:
  horizons_sec: [1, 3, 5, 10]
  horizon_embed_dim: 64
  hidden_dim: 512
heads:
  triplet_group_dim: 18   # Phase 0 backfill after clustering
  instrument_dim: 6
  phase_dim: 7
  cvs_ordinal_dim: 6
  anatomy_dim: 5
hazard:
  shared_hidden_dim: 256
  num_bins: 20

action_encoder:
  instrument_dim: 6
  phase_dim: 7
  triplet_vocab_size: 100
  triplet_embed_dim: 32
  token_dim: 64
  set_transformer_heads: 4

event_dyn:
  bin_embed_dim: 64
  film_hidden_dim: 256

next_action_head:
  trunk_dim: 256

phase_gated_hazard:
  action_dim: 64
  source_dim: 2
  age_dim: 16
  num_phases: 7

state_age:
  input_dim: 3
  embed_dim: 16
