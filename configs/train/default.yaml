optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.05
scheduler:
  name: cosine
  min_lr: 1.0e-6
  warmup_epochs: 5
trainer:
  max_epochs: 100
  batch_size: 64
  num_workers: 8
  precision: bf16-mixed
loss:
  lambda_align: 0.5
  lambda_hazard: 1.0
  lambda_prior: 0.3
  eta_group: 1.0
  focal_gamma: 2.0
  # V2 loss weights
  lambda_dyn: 0.5
  lambda_next: 0.3
  lambda_rank: 0.1
  lambda_consist: 0.1
  alpha_delta: 1.0
  beta_delta: 1.0

teacher_forcing:
  rho_init: 1.0
  rho_final: 0.0
  schedule: linear   # linear, cosine, step
